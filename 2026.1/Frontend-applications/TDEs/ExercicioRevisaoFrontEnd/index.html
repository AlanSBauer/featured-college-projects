<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tarefas</title>
  <link type="text/css" rel="stylesheet" href="assets/css/style.css">

</head>
<body>
  <header>
    <h1>📝 Minhas Tarefas</h1>
    <p>Gerencie suas atividades do dia</p>
  </header>

  <main>

    <section id="formulario">
      <input type="text" id="inputTarefa" placeholder="Digite uma nova tarefa...">
      <button onclick="adicionarTarefa()" id="btnAdicionar">Adicionar</button>

    </section>

    <section id="info">
      <span id="contadorTexto">Nenhuma tarefa adicionada.</span>
    </section>

    <section id="listaTarefas">

      <ul id="lista">
        
      </ul>

    </section>

  </main>

  <footer>
    <p>Aula 02 - Revisão HTML, CSS e JavaScript</p>
  </footer>

  <script type="text/javascript" src="assets/js/script.js"></script>

</body>
</html>
